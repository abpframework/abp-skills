name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "lts/*"

      - name: Detect lint scope
        id: scope
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # If config or workflow changed, lint all .md files; otherwise lint only changed .md files.
          CONFIG_CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- '.markdownlint-cli2.jsonc' '.github/workflows/markdownlint.yml')
          if [ -n "$CONFIG_CHANGED" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            # Emit a newline-delimited multiline output so filenames with spaces stay one item.
            FILES=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- '*.md')
            if [ -n "$FILES" ]; then
              {
                echo "files<<__MDLINT_EOF__"
                echo "$FILES"
                echo "__MDLINT_EOF__"
              } >> "$GITHUB_OUTPUT"
              echo "mode=changed" >> "$GITHUB_OUTPUT"
            else
              echo "mode=none" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run markdownlint
        if: steps.scope.outputs.mode != 'none'
        env:
          MODE: ${{ steps.scope.outputs.mode }}
          FILES: ${{ steps.scope.outputs.files }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "all" ]; then
            npx markdownlint-cli2@0.23.0 "**/*.md"
          else
            # Read the newline-delimited list into an array so spaces/globs are safe.
            mapfile -t FILE_ARR <<< "$FILES"
            npx markdownlint-cli2@0.23.0 "${FILE_ARR[@]}"
          fi
